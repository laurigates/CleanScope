name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/privacy-policy.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          mkdir -p _site
          cp docs/privacy-policy.html _site/privacy-policy.html
          # Create a simple redirect index
          cat > _site/index.html << 'HEREDOC'
          <!DOCTYPE html>
          <html><head><meta http-equiv="refresh" content="0;url=privacy-policy.html"></head></html>
          HEREDOC

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
